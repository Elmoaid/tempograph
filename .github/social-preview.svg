<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bc8cff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Graph nodes - left -->
  <circle cx="95" cy="160" r="30" fill="url(#node1)" stroke="#58a6ff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="170" cy="100" r="22" fill="url(#node2)" stroke="#bc8cff" stroke-width="1" opacity="0.45"/>
  <circle cx="45" cy="245" r="18" fill="url(#node3)" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <circle cx="190" cy="210" r="24" fill="url(#node1)" stroke="#58a6ff" stroke-width="1" opacity="0.35"/>
  <circle cx="75" cy="330" r="15" fill="url(#node2)" stroke="#bc8cff" stroke-width="1" opacity="0.3"/>
  <circle cx="160" cy="300" r="12" fill="url(#node3)" stroke="#3fb950" stroke-width="1" opacity="0.25"/>
  <line x1="95" y1="160" x2="170" y2="100" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>
  <line x1="95" y1="160" x2="45" y2="245" stroke="#58a6ff" stroke-width="1" opacity="0.15"/>
  <line x1="95" y1="160" x2="190" y2="210" stroke="#bc8cff" stroke-width="1" opacity="0.15"/>
  <line x1="45" y1="245" x2="75" y2="330" stroke="#3fb950" stroke-width="1" opacity="0.12"/>
  <line x1="190" y1="210" x2="160" y2="300" stroke="#3fb950" stroke-width="1" opacity="0.1"/>

  <!-- Graph nodes - right -->
  <circle cx="1155" cy="350" r="26" fill="url(#node2)" stroke="#bc8cff" stroke-width="1.2" opacity="0.5"/>
  <circle cx="1215" cy="290" r="20" fill="url(#node1)" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <circle cx="1090" cy="425" r="22" fill="url(#node3)" stroke="#3fb950" stroke-width="1" opacity="0.35"/>
  <circle cx="1230" cy="410" r="15" fill="url(#node1)" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="1170" cy="500" r="18" fill="url(#node2)" stroke="#bc8cff" stroke-width="1" opacity="0.25"/>
  <line x1="1155" y1="350" x2="1215" y2="290" stroke="#bc8cff" stroke-width="1" opacity="0.2"/>
  <line x1="1155" y1="350" x2="1090" y2="425" stroke="#58a6ff" stroke-width="1" opacity="0.15"/>
  <line x1="1155" y1="350" x2="1230" y2="410" stroke="#3fb950" stroke-width="1" opacity="0.15"/>
  <line x1="1090" y1="425" x2="1170" y2="500" stroke="#bc8cff" stroke-width="1" opacity="0.12"/>

  <!-- Title -->
  <text x="640" y="195" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="80" font-weight="700" fill="#f0f6fc" letter-spacing="-1.5">TempoGraph</text>

  <!-- Accent line -->
  <rect x="490" y="220" width="300" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Hook line -->
  <text x="640" y="275" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#f0f6fc">Stop guessing. See your entire codebase at a glance.</text>

  <!-- The sell - three punchy lines -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="640" y="350" font-size="18" fill="#8b949e">Every function, every dependency, every risk</text>
    <text x="640" y="378" font-size="18" fill="#8b949e">mapped and searchable in milliseconds.</text>

    <text x="640" y="430" font-size="18" fill="#58a6ff">24 tools for your AI agent.</text>
    <text x="640" y="458" font-size="18" fill="#bc8cff">A full desktop app for you.</text>
    <text x="640" y="486" font-size="18" fill="#3fb950">170+ languages out of the box.</text>
  </g>

  <!-- Bottom -->
  <text x="640" y="565" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace" font-size="15" fill="#484f58">pip install tempograph</text>
</svg>

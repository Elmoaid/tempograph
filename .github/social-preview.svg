<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bc8cff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Graph nodes (background decoration) -->
  <!-- Node cluster - left side -->
  <circle cx="115" cy="180" r="28" fill="url(#node1)" stroke="#58a6ff" stroke-width="1" opacity="0.6"/>
  <circle cx="180" cy="120" r="20" fill="url(#node2)" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
  <circle cx="60" cy="260" r="16" fill="url(#node3)" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="230" r="22" fill="url(#node1)" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="90" cy="340" r="14" fill="url(#node2)" stroke="#bc8cff" stroke-width="1" opacity="0.3"/>

  <!-- Edges between nodes -->
  <line x1="115" y1="180" x2="180" y2="120" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>
  <line x1="115" y1="180" x2="60" y2="260" stroke="#58a6ff" stroke-width="1" opacity="0.15"/>
  <line x1="115" y1="180" x2="200" y2="230" stroke="#bc8cff" stroke-width="1" opacity="0.15"/>
  <line x1="60" y1="260" x2="90" y2="340" stroke="#3fb950" stroke-width="1" opacity="0.12"/>
  <line x1="200" y1="230" x2="180" y2="120" stroke="#bc8cff" stroke-width="1" opacity="0.12"/>

  <!-- Node cluster - right side -->
  <circle cx="1140" cy="380" r="24" fill="url(#node2)" stroke="#bc8cff" stroke-width="1" opacity="0.5"/>
  <circle cx="1200" cy="320" r="18" fill="url(#node1)" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <circle cx="1080" cy="450" r="20" fill="url(#node3)" stroke="#3fb950" stroke-width="1" opacity="0.35"/>
  <circle cx="1220" cy="440" r="14" fill="url(#node1)" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="1160" cy="520" r="16" fill="url(#node2)" stroke="#bc8cff" stroke-width="1" opacity="0.25"/>

  <line x1="1140" y1="380" x2="1200" y2="320" stroke="#bc8cff" stroke-width="1" opacity="0.2"/>
  <line x1="1140" y1="380" x2="1080" y2="450" stroke="#58a6ff" stroke-width="1" opacity="0.15"/>
  <line x1="1140" y1="380" x2="1220" y2="440" stroke="#3fb950" stroke-width="1" opacity="0.15"/>
  <line x1="1080" y1="450" x2="1160" y2="520" stroke="#bc8cff" stroke-width="1" opacity="0.12"/>

  <!-- Main title -->
  <text x="640" y="235" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#f0f6fc" letter-spacing="-1">tempograph</text>

  <!-- Accent line -->
  <rect x="520" y="260" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="640" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#8b949e">Code graph context engine for AI coding agents</text>

  <!-- Stats row -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <!-- Stat 1 -->
    <text x="310" y="420" text-anchor="middle" font-size="32" font-weight="700" fill="#58a6ff">+18.6%</text>
    <text x="310" y="448" text-anchor="middle" font-size="14" fill="#8b949e">F1 improvement (p=0.049)</text>

    <!-- Stat 2 -->
    <text x="640" y="420" text-anchor="middle" font-size="32" font-weight="700" fill="#bc8cff">24</text>
    <text x="640" y="448" text-anchor="middle" font-size="14" fill="#8b949e">MCP tools</text>

    <!-- Stat 3 -->
    <text x="970" y="420" text-anchor="middle" font-size="32" font-weight="700" fill="#3fb950">170+</text>
    <text x="970" y="448" text-anchor="middle" font-size="14" fill="#8b949e">languages</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="540" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace" font-size="16" fill="#484f58">pip install tempograph</text>
</svg>

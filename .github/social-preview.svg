<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#131920"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#d2a8ff"/>
    </linearGradient>
    <linearGradient id="n1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="n2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d2a8ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="n3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56d364;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#56d364;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Graph nodes - left -->
  <circle cx="90" cy="150" r="34" fill="url(#n1)" stroke="#58a6ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="170" cy="85" r="24" fill="url(#n2)" stroke="#d2a8ff" stroke-width="1.2" opacity="0.5"/>
  <circle cx="40" cy="240" r="20" fill="url(#n3)" stroke="#56d364" stroke-width="1.2" opacity="0.45"/>
  <circle cx="195" cy="215" r="26" fill="url(#n1)" stroke="#58a6ff" stroke-width="1" opacity="0.35"/>
  <circle cx="70" cy="335" r="16" fill="url(#n2)" stroke="#d2a8ff" stroke-width="1" opacity="0.3"/>
  <line x1="90" y1="150" x2="170" y2="85" stroke="#58a6ff" stroke-width="1.5" opacity="0.25"/>
  <line x1="90" y1="150" x2="40" y2="240" stroke="#56d364" stroke-width="1.2" opacity="0.2"/>
  <line x1="90" y1="150" x2="195" y2="215" stroke="#d2a8ff" stroke-width="1.2" opacity="0.18"/>
  <line x1="40" y1="240" x2="70" y2="335" stroke="#d2a8ff" stroke-width="1" opacity="0.14"/>

  <!-- Graph nodes - right -->
  <circle cx="1170" cy="340" r="30" fill="url(#n2)" stroke="#d2a8ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="1230" cy="275" r="22" fill="url(#n1)" stroke="#58a6ff" stroke-width="1.2" opacity="0.45"/>
  <circle cx="1095" cy="420" r="24" fill="url(#n3)" stroke="#56d364" stroke-width="1.2" opacity="0.4"/>
  <circle cx="1240" cy="405" r="16" fill="url(#n1)" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="1175" cy="510" r="18" fill="url(#n2)" stroke="#d2a8ff" stroke-width="1" opacity="0.25"/>
  <line x1="1170" y1="340" x2="1230" y2="275" stroke="#d2a8ff" stroke-width="1.5" opacity="0.25"/>
  <line x1="1170" y1="340" x2="1095" y2="420" stroke="#58a6ff" stroke-width="1.2" opacity="0.2"/>
  <line x1="1095" y1="420" x2="1175" y2="510" stroke="#d2a8ff" stroke-width="1" opacity="0.14"/>

  <!-- Title -->
  <text x="640" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-2">TempoGraph</text>

  <!-- Accent line -->
  <rect x="470" y="228" width="340" height="4" rx="2" fill="url(#accent)"/>

  <!-- Hook -->
  <text x="640" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#e6edf3">Stop guessing. See your entire codebase at a glance.</text>

  <!-- Three punches -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="640" y="370" font-size="21" font-weight="500" fill="#c9d1d9">Every function, every dependency, every risk</text>
    <text x="640" y="400" font-size="21" font-weight="500" fill="#c9d1d9">mapped and searchable in milliseconds.</text>

    <text x="310" y="470" font-size="22" font-weight="700" fill="#79c0ff">24 tools for your AI agent.</text>
    <text x="640" y="470" font-size="22" font-weight="700" fill="#d2a8ff">A desktop app for you.</text>
    <text x="970" y="470" font-size="22" font-weight="700" fill="#56d364">170+ languages.</text>
  </g>

  <!-- Install -->
  <text x="640" y="570" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Menlo, Consolas, monospace" font-size="18" font-weight="500" fill="#6e7681">pip install tempograph</text>
</svg>

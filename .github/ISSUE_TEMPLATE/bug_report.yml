name: Bug Report
description: Something broke or isn't working right
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. The more detail you give, the faster we can fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what went wrong. Include error messages if you have them.
      placeholder: "I ran `tempograph --mode focus ...` and got this error..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we trigger this on our end?
      placeholder: |
        1. Index a repo with `tempograph --mode overview /path/to/repo`
        2. Run focus on a symbol
        3. See error
    validations:
      required: true

  - type: dropdown
    id: usage
    attributes:
      label: How are you using tempograph?
      options:
        - CLI
        - MCP server (Claude Code, Cursor, etc.)
        - Python API
        - Docker
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tempograph version
      description: Run `tempograph --version` or `pip show tempograph`
      placeholder: "0.7.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, repo details, whatever helps.
